<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Interaction Log</title>
    <style>
        :root {
            --color-canvas-default: #ffffff;
            --color-canvas-subtle: #f6f8fa;
            --color-border-default: #d0d7de;
            --color-border-muted: #d8dee4;
            --color-fg-default: #24292f;
            --color-fg-muted: #57606a;
            --color-accent-fg: #0969da;
            --color-success-fg: #1a7f37;
            --color-attention-fg: #9a6700;
            --color-danger-fg: #cf222e;
            --color-role-user: #0969da;
            --color-role-model: #8a63d2;
            --color-role-tool: #6e7781;
        }

        body {
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
            font-size: 13px;
            line-height: 1.5;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: var(--color-canvas-subtle);
            color: var(--color-fg-default);
        }

        a { color: var(--color-accent-fg); text-decoration: none; }
        a:hover { text-decoration: underline; }

        .header { margin-bottom: 20px; display: flex; align-items: baseline; justify-content: space-between; border-bottom: 1px solid var(--color-border-default); padding-bottom: 10px; }
        .header h1 { font-size: 1.2em; margin: 0; }
        .meta-info { font-size: 0.9em; color: var(--color-fg-muted); }

        .log-stream {
            display: flex;
            flex-direction: column;
            gap: 0; /* Remove gap, use borders/margins on items */
            background: var(--color-canvas-default);
            border: 1px solid var(--color-border-default);
            border-radius: 6px;
            overflow: hidden;
        }

        .log-entry {
            padding: 8px 12px;
            border-bottom: 1px solid var(--color-border-muted);
            display: flex;
            gap: 12px;
            position: relative;
        }
        .log-entry:last-child { border-bottom: none; }

        .log-entry:hover { background-color: #fbfcfd; }

        /* Role Indicators (Left Border Strip) */
        .log-entry::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
        }
        .role-user::before { background-color: var(--color-role-user); }
        .role-model::before { background-color: var(--color-role-model); }
        .role-tool::before { background-color: var(--color-role-tool); }

        .role-icon {
            flex-shrink: 0;
            width: 24px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1em;
            padding-top: 2px;
            user-select: none;
        }
        .role-user .role-icon { color: var(--color-role-user); }
        .role-model .role-icon { color: var(--color-role-model); }
        .role-tool .role-icon { color: var(--color-role-tool); }

        .content { flex-grow: 1; min-width: 0; overflow-wrap: break-word; }

        .role-label {
            font-size: 0.85em;
            font-weight: 600;
            color: var(--color-fg-muted);
            margin-bottom: 2px;
            display: block;
        }

        /* Content Blocks */
        .text-block {
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* Tool Calls */
        .tool-call {
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
            background-color: #f6f8fa;
            border: 1px solid var(--color-border-muted);
            border-radius: 4px;
            padding: 6px 8px;
            margin: 4px 0;
        }
        .fn-name { color: var(--color-role-model); font-weight: bold; }
        .fn-args { color: var(--color-fg-default); }

        /* Tool Results */
        .tool-result {
            margin-top: 4px;
            color: var(--color-fg-muted);
        }

        /* Collapsibles */
        .collapsible-trigger {
            cursor: pointer;
            color: var(--color-accent-fg);
            font-size: 0.85em;
            display: inline-flex;
            align-items: center;
            margin-top: 4px;
            user-select: none;
        }
        .collapsible-trigger:hover { text-decoration: underline; }
        .collapsible-content { display: none; margin-top: 6px; border-top: 1px dashed var(--color-border-muted); padding-top: 6px; }
        .collapsible.open .collapsible-content { display: block; }
        .arrow { font-size: 0.8em; margin-left: 4px; transition: transform 0.2s; }
        .collapsible.open .arrow { transform: rotate(90deg); }

        pre { margin: 0; background: none; font-family: inherit; }

        .truncated-msg {
            background: #fff8c5;
            padding: 2px 6px;
            font-size: 0.85em;
            border-radius: 3px;
            display: inline-block;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>
            <a href="javascript:history.back()" style="margin-right: 10px; color: var(--color-fg-muted);">←</a>
            LLM Interaction Log
        </h1>
        <div class="meta-info" id="meta-info">Loading...</div>
    </div>

    <div id="log-stream" class="log-stream">
        <div style="padding: 20px; text-align: center; color: var(--color-fg-muted);">Loading conversation...</div>
    </div>

    <script>
        async function fetchLog() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) return;

            try {
                const res = await fetch(`/api/review?id=${id}`);
                const data = await res.json();
                render(data);
            } catch (e) {
                document.getElementById('log-stream').innerHTML = `<div style="padding:20px; color:red">Error: ${e.message}</div>`;
            }
        }

        function render(data) {
            // Meta
            document.getElementById('meta-info').innerText =
                `${data.model || '?'} • ${data.tokens_in + data.tokens_out} tokens • ${data.status}`;

            const container = document.getElementById('log-stream');
            container.innerHTML = '';

            let logs = [];
            try { logs = JSON.parse(data.logs || '[]'); } catch(e) { logs = []; }

            if (!Array.isArray(logs) || logs.length === 0) {
                container.innerHTML = '<div style="padding:20px; text-align:center">No logs available.</div>';
                return;
            }

            logs.forEach(entry => {
                const role = (entry.role || 'unknown').toLowerCase();
                const parts = entry.parts || [];
                
                let contentHtml = '';
                parts.forEach(part => {
                    if (part.text) {
                        contentHtml += formatText(part.text);
                    } 
                    else if (part.functionCall || part.function_call) {
                        const fc = part.functionCall || part.function_call;
                        const sig = formatSignature(fc.name, fc.args);
                        contentHtml += `
                            <div class="tool-call">
                                <span class="fn-name">${escapeHtml(sig.name)}</span>(<span class="fn-args">${escapeHtml(sig.args)}</span>)
                                ${formatJson(fc.args, true)}
                            </div>
                        `;
                    }
                    else if (part.functionResponse || part.function_response) {
                        const fr = part.functionResponse || part.function_response;
                        contentHtml += `
                            <div class="tool-result">
                                <span style="font-weight:bold; font-size:0.9em">➔ ${escapeHtml(fr.name)}</span> result:
                                ${formatJson(fr.response, true)}
                            </div>
                        `;
                    }
                });

                const div = document.createElement('div');
                div.className = `log-entry role-${role === 'model' ? 'model' : (role === 'user' ? 'user' : 'tool')}`;
                
                let icon = '?';
                let label = role.toUpperCase();
                if (role === 'user') { icon = 'U'; label = 'Sashiko'; }
                if (role === 'model') { icon = '🤖'; label = 'LLM'; }
                if (role === 'tool' || role === 'function') { icon = '🔧'; label = 'Tool'; }

                div.innerHTML = `
                    <div class="role-icon" title="${label}">${icon}</div>
                    <div class="content">
                        <div class="role-label">${label}</div>
                        ${contentHtml}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function formatSignature(name, args) {
            if (typeof args === 'string') { try { args = JSON.parse(args); } catch(e){} }
            if (!args || typeof args !== 'object') return { name, args: '' };

            const pairs = [];
            for (const [k, v] of Object.entries(args)) {
                // Formatting value: if string, quote it. if number/bool, literal. if obj, compact json?
                let valStr;
                if (typeof v === 'string') valStr = "\"${v}\"";
                else if (typeof v === 'object' && v !== null) valStr = '{...}'; // simplified for signature
                else valStr = String(v);
                pairs.push(`${k}=${valStr}`);
            }
            return { name, args: pairs.join(', ') };
        }

        function formatText(text) {
            if (!text) return '';
            const maxLen = 600;
            const maxLines = 8;
            
            // Check line count
            const lines = text.split('\n');
            const isLong = text.length > maxLen || lines.length > maxLines;

            if (isLong) {
                // Create preview
                let preview = text.substring(0, maxLen);
                if (lines.length > maxLines) {
                    preview = lines.slice(0, maxLines).join('\n');
                }
                
                // Ensure we didn't cut in middle of a line badly if using char limit, 
                // but pre-wrap handles it.
                
                return `
                    <div class="collapsible">
                        <div class="text-block">${escapeHtml(preview)} ...</div>
                        <div class="collapsible-trigger" onclick="this.parentElement.classList.toggle('open')">
                            Show full text (${text.length} chars) <span class="arrow">▶</span>
                        </div>
                        <div class="collapsible-content">
                            <div class="text-block">${escapeHtml(text)}</div>
                        </div>
                    </div>
                `;
            }
            return `<div class="text-block">${escapeHtml(text)}</div>`;
        }

        function formatJson(obj, collapse = false) {
            const str = JSON.stringify(obj, null, 2);
            if (!str) return '';
            
            // If it's a small object (one line), show inline?
            // User requested to "collapse it", so generally hide it.
            // But if it's super short like `{"status":"ok"}`, hiding it is annoying.
            // Let's hide if > 1 line.
            
            const isMultiLine = str.includes('\n');
            
            if (!isMultiLine && str.length < 80) {
                 return `<pre style="display:inline; color:#555;">${escapeHtml(str)}</pre>`;
            }

            // Otherwise collapsible
            return `
                <div class="collapsible">
                     <div class="collapsible-trigger" onclick="this.parentElement.classList.toggle('open')">
                        ${collapse ? 'Show JSON' : 'Hide JSON'} <span class="arrow">▶</span>
                    </div>
                    <div class="collapsible-content">
                        <pre class="text-block" style="font-size:0.9em; color:#444;">${escapeHtml(str)}</pre>
                    </div>
                </div>
            `;
        }

        function escapeHtml(str) {
            return (str || '').replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        fetchLog();
    </script>
</body>
</html>
